<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>wiki edit triage</title>
<style>
  :root {
    --page: #f9f9f7;
    --surface: #fcfcfb;
    --text: #0b0b0b;
    --secondary: #52514e;
    --hairline: #e1e0d9;
    --vandalism: #e34948;
    --substantive: #2a78d6;
    --trivia: #898781;
    --unclear: #eda100;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --page: #0d0d0d;
      --surface: #1a1a19;
      --text: #ffffff;
      --secondary: #c3c2b7;
      --hairline: #2c2c2a;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--page);
    color: var(--text);
    font: 14px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  main { max-width: 1100px; margin: 0 auto; padding: 24px 20px 48px; }
  header h1 { margin: 0 0 12px; font-size: 20px; font-weight: 650; }

  #banner {
    display: none;
    padding: 11px 14px; margin-bottom: 16px;
    border-radius: 8px;
    background: #c22a1f; color: #fff;
    border: 1px solid #7f1d1d;
    font-size: 13px; font-weight: 600; line-height: 1.4;
  }
  @media (prefers-color-scheme: dark) {
    #banner { background: #e0483c; border-color: #f08a80; color: #1a0000; }
  }
  #banner.show { display: block; }

  #stats {
    display: flex; flex-wrap: wrap; gap: 8px 20px;
    padding: 10px 14px; margin-bottom: 16px;
    background: var(--surface);
    border: 1px solid var(--hairline); border-radius: 8px;
    color: var(--secondary); font-size: 13px;
  }
  #stats b { color: var(--text); font-variant-numeric: tabular-nums; }

  #filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  #filters button {
    font: inherit; font-size: 13px; cursor: pointer;
    color: var(--secondary);
    background: var(--surface);
    border: 1px solid var(--hairline); border-radius: 999px;
    padding: 5px 14px;
  }
  #filters button.active {
    color: var(--page);
    background: var(--text);
    border-color: var(--text);
  }

  #toolbar {
    display: flex; flex-wrap: wrap; align-items: center;
    justify-content: space-between; gap: 10px; margin-bottom: 16px;
  }
  #search {
    font: inherit; font-size: 13px;
    color: var(--text); background: var(--surface);
    border: 1px solid var(--hairline); border-radius: 999px;
    padding: 6px 14px; min-width: 220px; flex: 1 1 220px; max-width: 360px;
  }
  #pager { display: flex; align-items: center; gap: 8px; }
  #pager button {
    font: inherit; font-size: 13px; cursor: pointer;
    color: var(--secondary); background: var(--surface);
    border: 1px solid var(--hairline); border-radius: 999px;
    padding: 5px 14px;
  }
  #pager button:disabled { opacity: 0.4; cursor: default; }
  #pageInfo {
    color: var(--secondary); font-size: 13px;
    font-variant-numeric: tabular-nums; min-width: 72px; text-align: center;
  }

  .table-wrap {
    overflow-x: auto;
    background: var(--surface);
    border: 1px solid var(--hairline); border-radius: 8px;
  }
  table { border-collapse: collapse; width: 100%; min-width: 860px; }
  th, td {
    text-align: left; padding: 8px 12px;
    border-bottom: 1px solid var(--hairline);
    white-space: nowrap;
  }
  tr:last-child td { border-bottom: none; }
  th {
    font-size: 12px; font-weight: 600; color: var(--secondary);
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  td.num { font-variant-numeric: tabular-nums; }
  td.reason {
    max-width: 280px; overflow: hidden; text-overflow: ellipsis;
    color: var(--secondary);
  }
  td.time, td.pass, td.editor { color: var(--secondary); }
  .dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    margin-right: 6px; vertical-align: baseline;
  }
  a { color: var(--substantive); text-decoration: none; }
  a:hover { text-decoration: underline; }
  #empty { padding: 24px; text-align: center; color: var(--secondary); }
</style>
</head>
<body>
<main>
  <div id="banner" role="alert"></div>

  <header>
    <h1>wiki edit triage</h1>
    <div id="stats">loading…</div>
  </header>

  <div id="filters"></div>

  <div id="toolbar">
    <input id="search" type="search" placeholder="Search titles…"
           autocomplete="off" spellcheck="false" aria-label="Search titles">
    <div id="pager">
      <button id="prev" type="button">‹ Prev</button>
      <span id="pageInfo"></span>
      <button id="next" type="button">Next ›</button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Processed</th><th>Label</th><th>Conf</th><th>Pass</th>
          <th>Title</th><th>Reason</th><th>Δ bytes</th><th>Editor</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div id="empty" hidden>no edits yet</div>
  </div>
</main>

<script>
(() => {
  "use strict";
  const LABELS = ["vandalism", "substantive", "trivia", "unclear"];
  const DOT_COLORS = {
    vandalism: "#e34948",
    substantive: "#2a78d6",
    trivia: "#898781",
    unclear: "#eda100",
  };
  const STALE_AFTER_MS = 120000; // 2 min with no new classifications = stalled
  const PAGE_SIZE = 50;

  let activeLabel = null; // null = All
  let searchQuery = "";
  let offset = 0;

  // banner inputs, refreshed on every poll
  let statsError = false;
  let editsError = false;
  let lastProcessedAt = null;

  const bannerEl = document.getElementById("banner");
  const statsEl = document.getElementById("stats");
  const filtersEl = document.getElementById("filters");
  const rowsEl = document.getElementById("rows");
  const emptyEl = document.getElementById("empty");
  const searchEl = document.getElementById("search");
  const prevEl = document.getElementById("prev");
  const nextEl = document.getElementById("next");
  const pageInfoEl = document.getElementById("pageInfo");

  function el(tag, props) {
    const node = document.createElement(tag);
    if (props) Object.assign(node, props);
    return node;
  }

  function dot(label) {
    const d = el("span", { className: "dot" });
    d.style.background = DOT_COLORS[label] || "var(--secondary)";
    return d;
  }

  function fmtTime(iso) {
    if (!iso) return "—";
    const d = new Date(iso);
    return isNaN(d) ? "—" : d.toLocaleString();
  }

  // ---- health banner -------------------------------------------------------
  // Recomputed after every poll of either endpoint. Error state wins over
  // staleness; auto-clears once data is reachable and fresh again. Static
  // strings, but set via textContent to keep the no-innerHTML invariant.
  function updateBanner() {
    let msg = "";
    if (statsError || editsError) {
      msg = "⚠ Cannot reach the API — the web service or database may be down.";
    } else if (lastProcessedAt) {
      const age = Date.now() - new Date(lastProcessedAt).getTime();
      if (age > STALE_AFTER_MS) {
        const mins = Math.round(age / 60000);
        msg = "⚠ No new classifications in the last " + mins +
          " min — the ingest → reasoning pipeline may be stalled " +
          "(check the connect and service containers).";
      }
    }
    bannerEl.textContent = msg;
    bannerEl.classList.toggle("show", msg !== "");
  }

  // ---- filters -------------------------------------------------------------
  function renderFilters() {
    filtersEl.replaceChildren();
    for (const label of [null, ...LABELS]) {
      const btn = el("button", {
        type: "button",
        className: label === activeLabel ? "active" : "",
      });
      if (label) btn.append(dot(label));
      btn.append(document.createTextNode(label ?? "All"));
      btn.addEventListener("click", () => {
        activeLabel = label;
        offset = 0; // new filter starts at the first page
        renderFilters();
        refreshEdits();
      });
      filtersEl.append(btn);
    }
  }

  // ---- stats strip ---------------------------------------------------------
  async function refreshStats() {
    try {
      const res = await fetch("/api/stats");
      if (!res.ok) { statsError = true; updateBanner(); return; }
      const s = await res.json();
      statsError = false;
      lastProcessedAt = s.last_processed_at ?? null;

      statsEl.replaceChildren();
      const total = el("span");
      total.append("total ", el("b", { textContent: String(s.total) }));
      statsEl.append(total);

      for (const label of LABELS) {
        const entry = s.labels[label];
        const span = el("span");
        span.append(
          dot(label),
          label + " ",
          el("b", { textContent: String(entry ? entry.count : 0) }),
        );
        if (entry && entry.avg_confidence != null) {
          span.append(" · avg " + Number(entry.avg_confidence).toFixed(2));
        }
        statsEl.append(span);
      }

      const last = el("span");
      last.append(
        "last processed ",
        el("b", { textContent: fmtTime(s.last_processed_at) }),
      );
      statsEl.append(last);
      updateBanner();
    } catch {
      statsError = true;
      updateBanner();
    }
  }

  // ---- edits table ---------------------------------------------------------
  // Every value below comes from Wikipedia and is untrusted: all of it goes
  // through textContent / createTextNode, never innerHTML.
  function renderRow(edit) {
    const tr = el("tr");

    tr.append(el("td", { className: "time", textContent: fmtTime(edit.processed_at) }));

    const labelTd = el("td");
    if (edit.label) {
      labelTd.append(dot(edit.label), document.createTextNode(edit.label));
    } else {
      labelTd.textContent = "—";
    }
    tr.append(labelTd);

    tr.append(el("td", {
      className: "num",
      textContent: edit.confidence == null ? "—" : Number(edit.confidence).toFixed(2),
    }));
    tr.append(el("td", { className: "pass", textContent: edit.pass ?? "—" }));

    const titleTd = el("td");
    if (edit.notify_url) {
      const a = el("a", {
        href: edit.notify_url,
        target: "_blank",
        rel: "noopener",
        textContent: edit.title ?? "(untitled)",
      });
      titleTd.append(a);
    } else {
      titleTd.textContent = edit.title ?? "(untitled)";
    }
    tr.append(titleTd);

    const reasonTd = el("td", { className: "reason", textContent: edit.reason ?? "" });
    if (edit.reason) reasonTd.title = edit.reason;
    tr.append(reasonTd);

    const delta = edit.byte_delta;
    tr.append(el("td", {
      className: "num",
      textContent: delta == null ? "—" : (delta > 0 ? "+" + delta : String(delta)),
    }));

    tr.append(el("td", { className: "editor", textContent: edit.editor ?? "—" }));

    return tr;
  }

  function updatePager(edits, hasMore) {
    prevEl.disabled = offset <= 0;
    nextEl.disabled = !hasMore;
    if (edits.length === 0) {
      pageInfoEl.textContent = offset > 0 ? "—" : "0 results";
    } else {
      pageInfoEl.textContent = (offset + 1) + "–" + (offset + edits.length);
    }
  }

  async function refreshEdits() {
    // Capture the full view identity; a slow response for a stale
    // query/label/page must not overwrite a newer view.
    const reqLabel = activeLabel;
    const reqQuery = searchQuery;
    const reqOffset = offset;
    try {
      const params = new URLSearchParams();
      if (reqLabel) params.set("label", reqLabel);
      if (reqQuery) params.set("q", reqQuery);
      params.set("limit", String(PAGE_SIZE));
      params.set("offset", String(reqOffset));
      const res = await fetch("/api/edits?" + params);
      if (!res.ok) { editsError = true; updateBanner(); return; }
      const body = await res.json();
      editsError = false;
      updateBanner();
      if (reqLabel !== activeLabel || reqQuery !== searchQuery || reqOffset !== offset) {
        return; // stale response, the view moved on
      }
      const edits = body.edits ?? [];
      rowsEl.replaceChildren(...edits.map(renderRow));
      emptyEl.hidden = edits.length > 0;
      updatePager(edits, Boolean(body.hasMore));
    } catch {
      editsError = true;
      updateBanner();
    }
  }

  // ---- search + pagination wiring -----------------------------------------
  let searchTimer = null;
  searchEl.addEventListener("input", () => {
    if (searchTimer) clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      searchQuery = searchEl.value;
      offset = 0; // new query starts at the first page
      refreshEdits();
    }, 300);
  });

  prevEl.addEventListener("click", () => {
    if (offset <= 0) return;
    offset = Math.max(0, offset - PAGE_SIZE);
    refreshEdits();
  });
  nextEl.addEventListener("click", () => {
    if (nextEl.disabled) return;
    offset += PAGE_SIZE;
    refreshEdits();
  });

  renderFilters();
  refreshStats();
  refreshEdits();
  setInterval(refreshStats, 5000);
  setInterval(refreshEdits, 5000);
})();
</script>
</body>
</html>
